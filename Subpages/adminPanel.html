<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📚Admin Panel | BookNest</title>
    <link rel="shortcut icon" href="../img/ico.png">
    <link href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Loopet:wght@100..400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url("../img/adminBg - Copy.jpg") center/cover no-repeat fixed;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #222249;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 400;
            font-family: "Lilita One", sans-serif;
        }

        .navbar ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            position: relative;
            transition: all 0.3s ease;
        }

        .navbar a:hover {
            background-size: 100cm;
            background-color: #ffe1b8;
            padding: 10px;
            border-radius: 5px;
            border: #E64833;
            color: #77372e;
            transform: scale(1.1);
        }

        .admin-container {
            padding: 2rem;
        }

        h2 {
            color: #12133f;
        }

        .tabs {
            font-family: "DM Sans", sans-serif;
            justify-content: center;
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .tab-button {
            font-family: "DM Sans", sans-serif;
            padding: 0.7rem 1.5rem;
            border: none;
            background-color: #dbaa80;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .tab-button:hover {
            background-color: #d18d75;
        }

        .tab-button.active {
            background-color: #12133f;
            color: white;
        }

        .tab-content {
            font-family: "DM Sans", sans-serif;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            font-family: "DM Sans", sans-serif;
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #12133f;
            color: white;
        }

        .action-btn {
            background-color: #868fd4;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
            font-family: "DM Sans", sans-serif;
        }

        .delete-btn {
            background-color: #e64833;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        #addBookBtn.active {
            background-color: #12133f;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        form#addBookForm {
            margin-left: 300px;
            justify-content: center;
            background: #ffd2d2ee;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin: 3rem 0;
            max-width: 600px;
        }

        form#addBookForm h3 {
            font-family: "Lilita One", sans-serif;
            margin-bottom: 1.5rem;
            color: #12133f;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-family: "DM Sans", sans-serif;
            color: #333;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="file"] {
            width: 95%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: "DM Sans", sans-serif;
            font-size: 1rem;
        }

        form#addBookForm .action-btn {
            background-color: #12133f;
            color: white;
            padding: 0.7rem 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 1rem;
        }

        form#addBookForm .action-btn:hover {
            background-color: #33356d;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">📚 BookNest</div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li>AdminPanel</li>
            </ul>
        </nav>
    </header>
    <div class="admin-container">
        <div class="tabs">
            <button class="tab-button active" onclick="showTab('products')">Products</button>
            <button class="tab-button" onclick="showTab('users')">Users</button>
            <button class="tab-button" onclick="showTab('messages')">Messages</button>
            <button class="tab-button" onclick="showTab('sales')">Sales</button>
        </div>
        <div id="products" class="tab-content active">
            <button id="addBookBtn" onclick="toggleForm()" class="tab-button">➕ Add New Book</button>
            <form id="addBookForm" style="display: none;" action="../php/add_book.php" method="POST"
                enctype="multipart/form-data">
                <h3>Add New Book</h3>
                <div class="form-group">
                    <label>Book Name</label>
                    <input type="text" id="bookName" name="bookName" required />
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="bookAuthor" name="bookAuthor" required />
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="bookPrice" name="bookPrice" step="0.01" required />
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="bookImage" name="bookImage" accept="image/*" required />
                </div>
                <button type="submit" class="action-btn">Save Book</button>
            </form>
            <h3>All Products</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="books-tbody"></tbody>
            </table>
        </div>
        <div id="users" class="tab-content">
            <h3>Signed-In Users</h3>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
        <div id="messages" class="tab-content">
            <h3>Contact Messages</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Received At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messages-tbody"></tbody>
            </table>
        </div>
        <div id="sales" class="tab-content">
            <h3>Sales Details</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Session ID</th>
                        <th>Book ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Sale Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="sales-tbody"></tbody>
            </table>
        </div>
    </div>
    <script>
        function showTab(tabId) {
            const tabs = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-button');

            tabs.forEach(tab => tab.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if (tabId === 'products') {
                loadBooks();
            } else if (tabId === 'users') {
                loadUsers();
            } else if (tabId === 'messages') {
                loadMessages();
            } else if (tabId === 'sales') {
                loadSales();
            }
        }

        function toggleForm() {
            const form = document.getElementById('addBookForm');
            const button = document.getElementById('addBookBtn');

            const isVisible = form.style.display === 'block';
            form.style.display = isVisible ? 'none' : 'block';
            button.classList.toggle('active', !isVisible);
        }

        function loadBooks() {
            fetch('../php/fetch_books.php')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const tbody = document.getElementById('books-tbody');
                        tbody.innerHTML = '';
                        data.books.forEach(book => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${book.id}</td>
                                <td>${book.title} <br><small>by ${book.author}</small></td>
                                <td>$${book.price}</td>
                                <td>
                                    <button class="action-btn delete-btn" data-book-id="${book.id}">Delete</button>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        alert('Failed to load books: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Error fetching books. Check console.');
                });
        }

        function loadUsers() {
            fetch('../php/fetch_user_admin.php')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const tbody = document.getElementById('users-tbody');
                        tbody.innerHTML = '';
                        data.users.forEach(user => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${user.id}</td>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>
                                    <button class="action-btn delete-btn" data-user-id="${user.id}">Delete</button>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        alert('Failed to load users: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Error fetching users. Check console.');
                });
        }

        function loadMessages() {
            fetch('../php/fetch_messages.php')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const tbody = document.getElementById('messages-tbody');
                        tbody.innerHTML = '';
                        data.messages.forEach(message => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${message.id}</td>
                                <td>${message.name}</td>
                                <td>${message.email}</td>
                                <td>${message.message}</td>
                                <td>${new Date(message.created_at).toLocaleString()}</td>
                                <td>
                                    <button class="action-btn delete-btn" data-message-id="${message.id}">Delete</button>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        alert('Failed to load messages: ' + data.message);
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Error fetching messages. Check console.');
                });
        }

        function loadSales() {
            fetch('../php/fetch_sales.php')
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! Status: ${res.status}`);
                    }
                    return res.text();
                })
                .then(text => {
                    console.log('Raw response:', text);
                    try {
                        const data = JSON.parse(text);
                        if (data.success) {
                            const tbody = document.getElementById('sales-tbody');
                            tbody.innerHTML = '';
                            data.sales.forEach(sale => {
                                const row = document.createElement('tr');
                                row.innerHTML = `
                                    <td>${sale.id}</td>
                                    <td>${sale.session_id}</td>
                                    <td>${sale.book_id}</td>
                                    <td>${sale.title}</td>
                                    <td>${sale.author}</td>
                                    <td>$${parseFloat(sale.price).toFixed(2)}</td>
                                    <td>${sale.quantity}</td>
                                    <td>$${parseFloat(sale.total).toFixed(2)}</td>
                                    <td>${new Date(sale.sale_date).toLocaleString()}</td>
                                    <td>
                                        <button class="action-btn delete-btn" data-sale-id="${sale.id}">Delete</button>
                                    </td>
                                `;
                                tbody.appendChild(row);
                            });
                        } else {
                            alert('Failed to load sales: ' + data.message);
                        }
                    } catch (e) {
                        console.error('JSON parse error:', e, 'Raw response:', text);
                        alert('Invalid JSON response. Check console for details.');
                    }
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                    alert('Error fetching sales: ' + err.message);
                });
        }

        function deleteBook(bookId, button) {
            if (confirm('Are you sure you want to delete this book?')) {
                fetch('../php/delete_book.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `id=${bookId}`
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            button.closest('tr').remove();
                            alert('Book deleted successfully.');
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('AJAX Error:', error);
                        alert('An error occurred while deleting the book. Check console.');
                    });
            }
        }

        function deleteUser(userId, button) {
            if (confirm('Are you sure you want to delete this user?')) {
                fetch('../php/delete_user.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `id=${userId}`
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            button.closest('tr').remove();
                            alert('User deleted successfully.');
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('AJAX Error:', error);
                        alert('An error occurred while deleting the user. Check console.');
                    });
            }
        }

        function deleteMessage(messageId, button) {
            if (confirm('Are you sure you want to delete this message?')) {
                fetch('../php/delete_message.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `id=${messageId}`
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            button.closest('tr').remove();
                            alert('Message deleted successfully.');
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('AJAX Error:', error);
                        alert('An error occurred while deleting the message. Check console.');
                    });
            }
        }

        function deleteSale(saleId, button) {
            if (confirm('Are you sure you want to delete this sale record?')) {
                fetch('../php/delete_sales.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `id=${saleId}`
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            button.closest('tr').remove();
                            alert('Sale deleted successfully.');
                        } else {
                            alert('Error: ' + data.message);
                        }
                    })
                    .catch(error => {
                        console.error('AJAX Error:', error);
                        alert('An error occurred while deleting the sale. Check console.');
                    });
            }
        }

        document.getElementById('books-tbody').addEventListener('click', function (event) {
            if (event.target.classList.contains('delete-btn')) {
                const bookId = event.target.getAttribute('data-book-id');
                deleteBook(bookId, event.target);
            }
        });

        document.getElementById('users-tbody').addEventListener('click', function (event) {
            if (event.target.classList.contains('delete-btn')) {
                const userId = event.target.getAttribute('data-user-id');
                deleteUser(userId, event.target);
            }
        });

        document.getElementById('messages-tbody').addEventListener('click', function (event) {
            if (event.target.classList.contains('delete-btn')) {
                const messageId = event.target.getAttribute('data-message-id');
                deleteMessage(messageId, event.target);
            }
        });

        document.getElementById('sales-tbody').addEventListener('click', function (event) {
            if (event.target.classList.contains('delete-btn')) {
                const saleId = event.target.getAttribute('data-sale-id');
                deleteSale(saleId, event.target);
            }
        });

        document.getElementById("addBookForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const form = document.getElementById("addBookForm");
            const formData = new FormData(form);
            fetch("../php/add_book.php", {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        loadBooks();
                        form.reset();
                        toggleForm();
                    } else {
                        alert("Error: " + data.message);
                    }
                })
                .catch(error => {
                    console.error("AJAX Error:", error);
                    alert("An error occurred. Check console for details.");
                });
        });

        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>

</html>
