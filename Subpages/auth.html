<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📚Auth | BookNest</title>
    <link rel="shortcut icon" href="../img/ico.png">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+HU:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Cormorant Garamond", serif;
            background: #f4f4f4;
            font-weight: 200px;
            display: flex;
            background: url("../img/adminBg.jpg") no-repeat center center/cover;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgb(224, 180, 180);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #131d28;
            margin-bottom: 1rem;
            font-family: "Pacifico", cursive;
            font-weight: 300;
            font-size: 25pt;
        }
        form {
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        input {
            padding: 10px;
            width: 93%;
            background-color: antiquewhite;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            background: #351b1b;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .toggle-link {
            margin-top: 10px;
            color: #121a23;
            cursor: pointer;
            text-decoration: underline;
        }
        .go-back {
            margin-top: 15px;
            display: inline-block;
            background: #1b172a;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 5px;
        }
        img {
            margin-top: 20px;
            margin-left: 340px;
            margin-bottom: -20px;
            width: 25px;
            height: auto;
        }
        .error {
            color: red;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="form-title">Sign In</h2>
        <form id="signin-form" method="POST" enctype="multipart/form-data">
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
            <div class="error" id="signin-error"></div>
        </form>
        <form id="signup-form" method="POST" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Full Name" required />
            <input type="email" name="email" placeholder="Email" required />
            <input type="password" name="password" placeholder="Password" required />
            <input type="password" name="confirm_password" placeholder="Confirm Password" required />
            <label style="text-align:left;">Upload Profile Image:</label>
            <input type="file" name="profile_image" accept="image/*" required />
            <button type="submit">Sign Up</button>
            <div class="error" id="signup-error"></div>
        </form>
        <div class="toggle-link" onclick="toggleForms()">Don't have an account? Sign Up</div>
        <a href="../index.html" class="go-back">⬅ Go Back</a>
        <div class="adminIco"><a href="AdminLogin.html">
            <img src="../img/user.png" alt="Admin Login"></a>
        </div>
    </div>
    <script>
        const signinForm = document.getElementById("signin-form");
        const signupForm = document.getElementById("signup-form");
        const formTitle = document.getElementById("form-title");
        const toggleLink = document.querySelector(".toggle-link");
        const signinError = document.getElementById("signin-error");
        const signupError = document.getElementById("signup-error");

        signinForm.style.display = "flex";

        function toggleForms() {
            if (signinForm.style.display === "flex") {
                signinForm.style.display = "none";
                signupForm.style.display = "flex";
                formTitle.textContent = "Sign Up";
                toggleLink.textContent = "Already have an account? Sign In";
                signinError.textContent = "";
                signupError.textContent = "";
            } else {
                signupForm.style.display = "none";
                signinForm.style.display = "flex";
                formTitle.textContent = "Sign In";
                toggleLink.textContent = "Don't have an account? Sign Up";
                signinError.textContent = "";
                signupError.textContent = "";
            }
        }

        signinForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(signinForm);
            fetch('../php/signin.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const redirect = sessionStorage.getItem('redirectAfterLogin') || '/bookBook/index.html';
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirect;
                } else {
                    signinError.textContent = data.message;
                }
            })
            .catch(err => {
                console.error('Sign-in error:', err);
                signinError.textContent = 'An error occurred. Please try again.';
            });
        });

        signupForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const password = signupForm.querySelector('input[name="password"]').value;
            const confirmPassword = signupForm.querySelector('input[name="confirm_password"]').value;
            if (password !== confirmPassword) {
                signupError.textContent = 'Passwords do not match';
                return;
            }
            const formData = new FormData(signupForm);
            fetch('../php/signup.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const redirect = sessionStorage.getItem('redirectAfterLogin') || '/bookBook/index.html';
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirect;
                } else {
                    signupError.textContent = data.message;
                }
            })
            .catch(err => {
                console.error('Sign-up error:', err);
                signupError.textContent = 'An error occurred. Please try again.';
            });
        });
    </script>
</body>
</html>
