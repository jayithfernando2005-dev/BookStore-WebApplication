<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📚Auth | BookNest</title>
    <link rel="shortcut icon" href="../img/ico.png">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+HU:wght@100..400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: "Cormorant Garamond", serif;
            background: #f4f4f4;
            font-weight: 200px;
            display: flex;
            background: url("../img/adminBg.jpg") no-repeat center center/cover;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgb(224, 180, 180);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #131d28;
            margin-bottom: 1rem;
            font-family: "Pacifico", cursive;
            font-weight: 300;
            font-size: 25pt;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            width: 93%;
            background-color: antiquewhite;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background: #351b1b;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .toggle-link {
            margin-top: 10px;
            color: #121a23;
            cursor: pointer;
            text-decoration: underline;
        }

        .go-back {
            margin-top: 15px;
            display: inline-block;
            background: #1b172a;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 5px;
        }

        img {
            margin-top: 20px;
            margin-left: 340px;
            margin-bottom: -20px;
            width: 25px;
            height: auto;
        }

        .error-message {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 id="form-title">AdminLogin</h2>

        <form id="signup-form">
            <input type="text" name="name" id="username" placeholder="User Name" required />
            <input type="password" name="password" id="password" placeholder="Password" required />
            <button type="submit">LogIn</button>
            <div id="errorMessage" class="error-message"></div>
        </form>

        <a href="auth.html" class="go-back">⬅ Go Back</a>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === "admin" && password === "123") {
                window.location.href = "adminPanel.html";
            } else if (username !== "admin" && password === "123") {
                errorMessage.textContent = "Invalid Username";
            }
            else if (username === "admin" && password !== "123") {
                errorMessage.textContent = "Invalid Password";
            } else if (username !== "admin" && password !== "123") {
                errorMessage.textContent = "Invalid username or password";
            }
        });
    </script>

</body>

</html>
